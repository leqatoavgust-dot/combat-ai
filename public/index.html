<!DOCTYPE html>
<html>
<head>
<title>Combat AI AAA</title>

<style>
body{
margin:0;
font-family: Arial;
background: radial-gradient(circle at top, #0b1020, #05070f);
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:25px;
font-size:32px;
font-weight:bold;
color:#7c3aed;
text-shadow:0 0 20px #7c3aed;
letter-spacing:2px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
padding:20px;
}

.card{
background: rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:18px;
padding:25px;
backdrop-filter: blur(12px);
box-shadow:0 0 30px rgba(124,58,237,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 40px rgba(124,58,237,0.35);
}

input{
width:90%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#7c3aed,#22d3ee);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

.result{
grid-column:1/3;
text-align:center;
padding:30px;
font-size:18px;
}

.winner{
font-size:30px;
color:#22c55e;
text-shadow:0 0 15px #22c55e;
margin-top:10px;
}

.barBox{
margin:10px 0;
}

.label{
font-size:14px;
color:#94a3b8;
margin-bottom:5px;
}

.bar{
height:12px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:50%;
background:linear-gradient(90deg,#7c3aed,#22d3ee);
transition:0.5s;
}

.glowText{
color:#22d3ee;
text-shadow:0 0 10px #22d3ee;
}

</style>

</head>

<body>

<header>⚔️ COMBAT AI AAA EDITION</header>

<div class="container">

<!-- SCAN -->
<div class="card">
<h3 class="glowText">🔍 Scan Player</h3>
<input id="scanName" placeholder="Enter player name">
<button id="scanBtn">SCAN</button>
</div>

<!-- COMPARE -->
<div class="card">
<h3 class="glowText">⚔️ Compare Players</h3>
<input id="aName" placeholder="Player A">
<input id="bName" placeholder="Player B">
<button id="compareBtn">COMPARE</button>
</div>

<!-- RESULT -->
<div class="card result" id="out">
Ready for battle...
</div>

</div>

<script src="app.js"></script>

</body>
</html>
